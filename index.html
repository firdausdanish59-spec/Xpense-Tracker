<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Xpense — Smart Finance Tracker</title>
    <meta name="description" content="Premium personal expense tracker with analytics, budgeting, and smart insights.">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Xpense" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body style="background:#0A0A0F;color:white;margin:0;font-family:Inter,sans-serif;">
    <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#a0aec0;">Loading Xpense...</div></div>
    <script>
      // Force unregister service workers and clear caches to fix blank page
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) { reg.unregister(); });
          if (regs.length > 0) {
            console.log('Service workers unregistered, reloading...');
            if ('caches' in window) {
              caches.keys().then(function(names) {
                Promise.all(names.map(function(n) { return caches.delete(n); })).then(function() {
                  window.location.reload();
                });
              });
            } else {
              window.location.reload();
            }
          }
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
